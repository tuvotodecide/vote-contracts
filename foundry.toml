[profile.default]
src = "src"
out = "out"
libs = ["lib"]
libraries = ["lib/contracts/contracts/lib/VerifierLib.sol:VerifierLib:<address>"]
ffi = true
ast = true
optimizer = true
optimizer_runs = 200
via_ir = true
build_info = true
extra_output = ["storageLayout"]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
mainnet = "https://mainnet.infura.io/v3/YOUR_INFURA_KEY"
arbitrum = "https://arb-mainnet.g.alchemy.com/v2/YOUR_ALCHEMY_KEY"   

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
